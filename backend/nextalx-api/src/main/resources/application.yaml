spring:
  application:
    name: nextalx-api

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/nextalx}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgre}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false

    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration